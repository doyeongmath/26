<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>박도영 | 풍문고등학교</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Pretendard', 'Noto Sans KR', -apple-system, BlinkMacSystemFont, sans-serif;
            background: #f0f2f8;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
        }

        .container {
            max-width: 520px;
            width: 100%;
        }

        /* 헤더 카드 */
        .header-card {
            background: linear-gradient(160deg, #1a1a2e 0%, #0f3460 100%);
            color: white;
            border-radius: 24px;
            padding: 44px 40px 32px;
            text-align: center;
            box-shadow: 0 24px 60px rgba(15, 52, 96, 0.35);
            margin-bottom: 16px;
        }

        .year-badge {
            display: inline-block;
            background: rgba(255,255,255,0.12);
            border: 1px solid rgba(255,255,255,0.2);
            padding: 5px 16px;
            border-radius: 30px;
            font-size: 0.82em;
            letter-spacing: 0.04em;
            margin-bottom: 20px;
            color: rgba(255,255,255,0.85);
        }

        .header-card h1 {
            font-size: 3em;
            font-weight: 800;
            letter-spacing: -0.02em;
            margin-bottom: 8px;
        }

        .header-card .role {
            font-size: 1em;
            color: rgba(255,255,255,0.6);
            margin-bottom: 28px;
        }

        /* 교사 정보 (헤더 하단) */
        .teacher-info {
            display: flex;
            justify-content: center;
            gap: 8px;
            flex-wrap: wrap;
            padding-top: 24px;
            border-top: 1px solid rgba(255,255,255,0.1);
        }

        .info-chip {
            display: flex;
            align-items: center;
            gap: 6px;
            background: rgba(255,255,255,0.08);
            padding: 7px 14px;
            border-radius: 20px;
            font-size: 0.83em;
            color: rgba(255,255,255,0.8);
        }

        .info-chip span { font-size: 1em; }

        /* 버튼 카드 */
        .menu-card {
            background: white;
            border-radius: 24px;
            padding: 28px 28px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.08);
            margin-bottom: 16px;
        }

        .section-label {
            font-size: 0.78em;
            font-weight: 700;
            color: #aab;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            margin-bottom: 16px;
            padding-left: 4px;
        }

        .buttons {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .btn {
            display: flex;
            align-items: center;
            gap: 16px;
            padding: 20px 22px;
            border-radius: 16px;
            text-decoration: none;
            color: white;
            transition: transform 0.2s ease, box-shadow 0.2s ease, filter 0.2s ease;
            box-shadow: 0 6px 20px rgba(0,0,0,0.12);
            position: relative;
            overflow: hidden;
        }

        .btn::after {
            content: '';
            position: absolute;
            inset: 0;
            background: rgba(255,255,255,0);
            transition: background 0.2s;
        }

        .btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 12px 30px rgba(0,0,0,0.18);
            filter: brightness(1.05);
        }

        .btn:active {
            transform: translateY(0);
            filter: brightness(0.97);
        }

        .btn-hakgeup   { background: linear-gradient(135deg, #0ba360 0%, #3cba92 100%); }
        .btn-daesu     { background: linear-gradient(135deg, #4776e6 0%, #8e54e9 100%); }
        .btn-nonsul    { background: linear-gradient(135deg, #f953c6 0%, #b91d73 100%); }
        .btn-sikdan    { background: linear-gradient(135deg, #f7971e 0%, #ffd200 100%); color: #3a2a00; }
        .btn-samgak1   { background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%); }
        .btn-samgak2   { background: linear-gradient(135deg, #1a1a2e 0%, #0f3460 100%); }

        .btn-icon {
            font-size: 1.8em;
            flex-shrink: 0;
            width: 44px;
            height: 44px;
            background: rgba(255,255,255,0.18);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .btn-text {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 3px;
        }

        .btn-title {
            font-size: 1.05em;
            font-weight: 800;
            letter-spacing: -0.01em;
        }

        .btn-meta {
            font-size: 0.75em;
            opacity: 0.75;
            font-weight: 400;
        }

        .btn-arrow {
            font-size: 1.3em;
            opacity: 0.6;
            flex-shrink: 0;
        }

        /* 푸터 */
        .footer {
            text-align: center;
            color: #aab;
            font-size: 0.8em;
            padding: 4px 0 8px;
        }

        @media (max-width: 480px) {
            .header-card { padding: 36px 28px 28px; }
            .header-card h1 { font-size: 2.4em; }
            .menu-card { padding: 24px 20px; }
            .btn { padding: 18px 18px; }
        }
    </style>
</head>
<body>
    <div class="container">

        <!-- 헤더 -->
        <div class="header-card">

            <h1>박도영</h1>

            <div class="teacher-info">
                <div class="info-chip">
                    <span>&#128205;</span> 4층 2학년부A
                </div>
                <div class="info-chip">
                    <span>&#128218;</span> 수학(대수) · 논술
                </div>
                <div class="info-chip">
                    <span>&#128231;</span> doyeongmath@gmail.com

        </div>

        <!-- 메뉴 -->
        <div class="menu-card">

            <div class="buttons">
                <a href="학급OT.html" class="btn btn-hakgeup">

                        <span class="btn-meta">2-7반 · 2학년 1학기</span>

                    <span class="btn-arrow">›</span>

                <a href="대수OT.html" class="btn btn-daesu">
                    <div class="btn-icon">&#128208;</div>
                    <div class="btn-text">
                        <span class="btn-title">대수 OT</span>
                        <span class="btn-meta">수학(대수) · 2학년 1학기</span>
                    </div>
                    <span class="btn-arrow">›</span>
                </a>
                <a href="논술OT.html" class="btn btn-nonsul">
                    <div class="btn-icon">&#9999;&#65039;</div>
                    <div class="btn-text">
                        <span class="btn-title">논술 OT</span>
                        <span class="btn-meta">한 학기 한 권 읽기 · 3학년 1학기</span>
                    </div>
                    <span class="btn-arrow">›</span>
                </a>
            </div>
        </div>

        <!-- 식단표 & 삼각함수 -->
        <div class="menu-card">
            <div class="section-label">학습 자료</div>
            <div class="buttons">
                <a href="april_lunch.html" class="btn btn-sikdan">
                    <div class="btn-icon">&#127860;</div>
                    <div class="btn-text">
                        <span class="btn-title">식단표</span>
                        <span class="btn-meta">풍문고등학교 · 2026</span>
                    </div>
                    <span class="btn-arrow">›</span>
                </a>
                <a href="삼각함수_단위원.html" class="btn btn-samgak1">
                    <div class="btn-icon">&#9898;</div>
                    <div class="btn-text">
                        <span class="btn-title">삼각함수 – 단위원</span>
                        <span class="btn-meta">수학(대수) · 삼각함수</span>
                    </div>
                    <span class="btn-arrow">›</span>
                </a>
                <a href="삼각함수_변환.html" class="btn btn-samgak2">
                    <div class="btn-icon">&#128260;</div>
                    <div class="btn-text">
                        <span class="btn-title">삼각함수 – 변환</span>
                        <span class="btn-meta">수학(대수) · 삼각함수</span>
                    </div>
                    <span class="btn-arrow">›</span>
                </a>
            </div>
        </div>

        <p class="footer">풍문고등학교 &nbsp;·&nbsp; 2026</p>
    </div>
</body>
</html>
