<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>4월 급식표 — 풍문고등학교</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&display=swap" rel="stylesheet">
<style>
  :root {
    --green-deep: #1a3d2b;
    --green-mid: #2d6a4f;
    --green-light: #52b788;
    --green-pale: #d8f3dc;
    --amber: #f4a261;
    --amber-dark: #e76f51;
    --cream: #fdf8f0;
    --card-bg: #ffffff;
    --text-main: #1a1a1a;
    --text-sub: #555;
    --text-muted: #bbb;
    --border: #e8e4dc;
    --shadow: 0 2px 12px rgba(0,0,0,0.07);
    --shadow-hover: 0 8px 32px rgba(0,0,0,0.13);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Noto Sans KR', sans-serif;
    background: var(--cream); color: var(--text-main);
    min-height: 100vh; -webkit-text-size-adjust: 100%;
  }

  /* ── 헤더 ── */
  .site-header {
    background: var(--green-deep); color: #fff;
    padding: clamp(16px,4vw,28px) clamp(16px,4vw,32px) clamp(14px,3vw,22px);
    position: relative; overflow: hidden;
  }
  .site-header::before {
    content: ''; position: absolute; right: -40px; top: -40px;
    width: 180px; height: 180px;
    background: radial-gradient(circle, rgba(82,183,136,0.25) 0%, transparent 70%);
    border-radius: 50%; pointer-events: none;
  }
  .header-inner { position: relative; z-index: 1; max-width: 1100px; margin: 0 auto; }
  .header-label { font-size: 10px; letter-spacing: 2.5px; text-transform: uppercase; color: var(--green-light); font-weight: 500; margin-bottom: 4px; }
  .header-title { font-size: clamp(22px,6vw,30px); font-weight: 900; letter-spacing: -0.5px; line-height: 1.1; }
  .header-title span { color: var(--amber); }
  .header-sub { font-size: clamp(11px,2.8vw,12px); color: rgba(255,255,255,0.45); margin-top: 4px; font-weight: 300; }

  /* ── 탭 ── */
  .week-nav {
    background: var(--green-deep); border-top: 1px solid rgba(255,255,255,0.08);
    overflow-x: auto; -webkit-overflow-scrolling: touch; scrollbar-width: none;
  }
  .week-nav::-webkit-scrollbar { display: none; }
  .week-nav-inner { max-width: 1100px; margin: 0 auto; display: flex; padding: 0 clamp(12px,3vw,24px); min-width: max-content; }
  .week-tab {
    padding: clamp(10px,2.5vw,12px) clamp(14px,3.5vw,20px);
    font-size: clamp(12px,3vw,13px); font-weight: 500;
    color: rgba(255,255,255,0.45); cursor: pointer; border: none; background: none;
    border-bottom: 3px solid transparent; transition: all 0.2s;
    font-family: 'Noto Sans KR', sans-serif; white-space: nowrap; -webkit-tap-highlight-color: transparent;
  }
  .week-tab:hover { color: rgba(255,255,255,0.8); }
  .week-tab.active { color: var(--amber); border-bottom-color: var(--amber); }

  /* ── 본문 ── */
  .main { max-width: 1100px; margin: 0 auto; padding: clamp(16px,4vw,28px) clamp(12px,3vw,28px) 60px; }
  .week-panel { display: none; }
  .week-panel.active { display: block; }
  .week-title-bar { display: flex; align-items: center; gap: 10px; margin-bottom: 14px; flex-wrap: wrap; }
  .week-title-bar h2 { font-size: clamp(13px,3.5vw,15px); font-weight: 700; color: var(--green-mid); }
  .week-title-bar .date-range { font-size: clamp(11px,2.8vw,12px); color: var(--text-muted); font-weight: 300; }
  .week-title-bar::after { content: ''; flex: 1; height: 1px; background: var(--border); min-width: 20px; }

  /* ── 그리드 ── */
  .day-headers { display: grid; grid-template-columns: repeat(5,1fr); gap: 10px; margin-bottom: 6px; }
  .day-header { text-align: center; padding: 6px 4px; font-size: 11px; font-weight: 700; letter-spacing: 0.5px; color: var(--green-mid); border-bottom: 2px solid var(--green-pale); }
  .day-grid { display: grid; grid-template-columns: repeat(5,1fr); gap: 10px; }

  /* ── 카드 ── */
  .meal-card, .exam-card {
    background: var(--card-bg); border: 1.5px solid var(--border);
    border-radius: 14px; overflow: hidden; box-shadow: var(--shadow);
    transition: box-shadow 0.2s, transform 0.2s; display: flex; flex-direction: column;
  }
  .meal-card:hover, .exam-card:hover { box-shadow: var(--shadow-hover); transform: translateY(-2px); }

  .card-date-bar {
    background: linear-gradient(135deg, var(--green-mid), var(--green-light));
    color: #fff; padding: clamp(7px,2vw,10px) clamp(10px,2.5vw,14px) clamp(6px,1.5vw,8px);
    display: flex; align-items: baseline; gap: 5px; flex-shrink: 0;
  }
  .exam-card .card-date-bar { background: linear-gradient(135deg,#c2410c,#f97316); }
  .special-card .card-date-bar { background: linear-gradient(135deg,#15803d,#4ade80); }
  .card-date-num { font-size: clamp(18px,4.5vw,22px); font-weight: 900; line-height: 1; }
  .card-date-day { font-size: clamp(10px,2.5vw,11px); font-weight: 500; opacity: 0.85; }
  .card-badge { margin-left: auto; background: rgba(255,255,255,0.22); border-radius: 5px; padding: 2px 6px; font-size: clamp(9px,2vw,10px); font-weight: 700; white-space: nowrap; }

  .card-body { padding: clamp(8px,2vw,11px) clamp(10px,2.5vw,14px); flex: 1; }

  /* ── 메뉴 아이템 ── */
  .meal-item {
    padding: 4px 0 3px;
    border-bottom: 1px solid #f3f0ea;
    display: flex; flex-direction: column; gap: 1px;
  }
  .meal-item:last-child { border-bottom: none; }

  /* 메뉴명 행 */
  .meal-row { display: flex; align-items: center; gap: 4px; }

  /* 기본 메뉴명 */
  .meal-name {
    font-size: clamp(11.5px,2.7vw,12.5px);
    color: var(--text-sub); font-weight: 400; line-height: 1.4; flex: 1;
  }
  /* 밥 */
  .meal-name.rice {
    font-size: clamp(11.5px,2.7vw,12.5px); color: #777; font-weight: 500;
  }
  /* 메인 메뉴 강조 */
  .meal-item.main-dish {
    background: #fffbf5;
    margin: 2px -14px;
    padding: 5px 14px 4px;
    border-bottom: 1px solid #f3ede0;
    border-radius: 0;
  }
  .meal-item.main-dish .meal-name {
    font-size: clamp(12.5px,3vw,13.5px);
    color: #c2410c;
    font-weight: 700;
  }
  .main-badge {
    font-size: 9px; font-weight: 700; letter-spacing: 0.3px;
    background: #fed7aa; color: #c2410c;
    padding: 1px 5px; border-radius: 3px; flex-shrink: 0; white-space: nowrap;
  }
  /* 디저트 */
  .meal-item.dessert-item {
    background: #fff8ef;
    margin: 2px -14px 0;
    padding: 4px 14px;
    border-bottom: none;
  }
  .meal-name.dessert {
    color: var(--amber-dark);
    font-weight: 600;
    font-size: clamp(11.5px,2.7vw,12.5px);
  }

  /* ── 알레르기: 숫자만, 한 줄, 초미니 ── */
  .al-line {
    font-size: 9.5px; color: var(--text-muted);
    letter-spacing: 0.3px; line-height: 1.2;
    padding-left: 1px;
  }



  /* ── 영양 바 ── */
  .nutrition-bar { background: #fafaf8; border-top: 1px solid var(--border); padding: clamp(7px,1.8vw,9px) clamp(10px,2.5vw,14px); }
  .nutrition-rows { display: flex; flex-direction: column; gap: 3px; }
  .nutrition-item { display: flex; align-items: center; gap: 4px; }
  .nutrition-name { font-size: 9px; color: var(--text-muted); width: 30px; flex-shrink: 0; }
  .nutrition-track { flex: 1; height: 3px; background: #ece8e0; border-radius: 2px; overflow: hidden; min-width: 0; }
  .nutrition-fill { height: 100%; border-radius: 2px; }
  .fill-kcal    { background: var(--amber); }
  .fill-protein { background: var(--green-light); }
  .fill-calcium { background: #74b3ce; }
  .fill-iron    { background: var(--amber-dark); }
  .nutrition-val { font-size: 9px; font-weight: 700; color: var(--text-sub); width: 36px; text-align: right; flex-shrink: 0; }
  .special-card { background: #f0fdf4; border: 1.5px solid #86efac; border-radius: 14px; overflow: hidden; box-shadow: var(--shadow); display: flex; flex-direction: column; }
  .special-body { flex: 1; display: flex; align-items: center; justify-content: center; flex-direction: column; padding: clamp(14px,4vw,20px); gap: 5px; }
  .special-icon { font-size: clamp(20px,5vw,26px); }
  .special-text { font-size: clamp(11px,2.8vw,12px); font-weight: 700; color: #16a34a; text-align: center; }

  .empty-card { background: #fafafa; border: 1.5px dashed #e0ddd6; border-radius: 14px; min-height: 100px; display: flex; align-items: center; justify-content: center; color: #ddd; font-size: 18px; }

  /* ── 알레르기 범례 ── */
  .legend { margin-top: 28px; background: var(--card-bg); border: 1.5px solid var(--border); border-radius: 14px; padding: clamp(14px,3.5vw,18px); }
  .legend-title { font-size: 11px; font-weight: 700; color: var(--green-mid); margin-bottom: 10px; letter-spacing: 0.5px; }
  .legend-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(120px,1fr)); gap: 4px 12px; }
  .legend-item { display: flex; align-items: center; gap: 5px; font-size: 10.5px; color: var(--text-sub); }
  .legend-num { font-weight: 700; color: var(--text-muted); width: 18px; flex-shrink: 0; font-size: 10px; }

  /* ════════ 모바일 ≤479px ════════ */
  @media (max-width: 479px) {
    .day-headers { display: none; }
    .day-grid { grid-template-columns: 1fr; gap: 8px; }

    .meal-card, .exam-card { flex-direction: row; border-radius: 12px; }
    .card-date-bar {
      flex-direction: column; align-items: center; justify-content: flex-start;
      width: 50px; flex-shrink: 0; padding: 10px 5px 8px; gap: 2px;
    }
    .card-date-num { font-size: 18px; }
    .card-date-day { font-size: 9px; }
    .card-badge { margin-left: 0; margin-top: 4px; font-size: 7.5px; padding: 2px 3px; white-space: normal; word-break: keep-all; text-align: center; max-width: 42px; line-height: 1.3; }
    .card-right { flex: 1; display: flex; flex-direction: column; min-width: 0; }
    .card-body { padding: 8px 10px; }
    .meal-item.main-dish { margin: 2px -10px; padding: 5px 10px 4px; }
    .meal-item.dessert-item { margin: 2px -10px 0; padding: 4px 10px; }

    .special-card { flex-direction: row; }
    .special-card .card-date-bar { flex-direction: column; align-items: center; width: 50px; flex-shrink: 0; padding: 10px 5px 8px; }
    .special-body { flex: 1; flex-direction: row; justify-content: flex-start; padding: 12px 14px; gap: 10px; }
    .special-text { font-size: 11px; text-align: left; }

    .empty-card { min-height: 52px; border-radius: 12px; }
    .legend-grid { grid-template-columns: repeat(2,1fr); }
  }

  /* 태블릿 480–700px */
  @media (min-width: 480px) and (max-width: 700px) {
    .day-headers { display: none; }
    .day-grid { grid-template-columns: repeat(2,1fr); gap: 10px; }
    .card-right { display: contents; }
  }

  /* 데스크톱 */
  @media (min-width: 701px) {
    .card-right { display: contents; }
  }
</style>
</head>

<main class="main" id="app"></main>

<script>
/* 알레르기 이름 */
const AL={1:'난류',2:'우유',3:'메밀',4:'땅콩',5:'대두',6:'밀',7:'고등어',8:'게',9:'새우',
  10:'돼지고기',11:'복숭아',12:'토마토',13:'아황산류',14:'호두',15:'닭고기',16:'쇠고기',17:'오징어',18:'조개류',19:'잣'};

/* 알레르기 한 줄: "5·6·15" 스타일 */
function alLine(nums){
  if(!nums||!nums.length) return '';
  return `<span class="al-line">${nums.join('·')}</span>`;
}

/* 메뉴 아이템 */
function row(m){
  const isMain = m.t==='main';
  const isRice = m.t==='rice';
  const isDessert = m.t==='dessert';
  let cls = 'meal-item';
  if(isMain) cls = 'meal-item main-dish';
  if(isDessert) cls = 'meal-item dessert-item';
  const nameCls = isRice?'meal-name rice': isDessert?'meal-name dessert':'meal-name';
  const prefix = isDessert?`<span style="font-size:11px;margin-right:2px">🍬</span>`:'';
  return `<div class="${cls}">
    <div class="meal-row">${prefix}<span class="${nameCls}">${m.n}</span></div>
    ${alLine(m.al)}
  </div>`;
}


/* 영양 바 (라벨 없음) */
function nutBar(k,p,ca,fe){
  const pct=(v,m)=>Math.min(100,Math.round(v/m*100));
  return `<div class="nutrition-bar">
    <div class="nutrition-rows">
      <div class="nutrition-item"><span class="nutrition-name">열량</span><div class="nutrition-track"><div class="nutrition-fill fill-kcal" style="width:${pct(k,1100)}%"></div></div><span class="nutrition-val">${k}</span></div>
      <div class="nutrition-item"><span class="nutrition-name">단백질</span><div class="nutrition-track"><div class="nutrition-fill fill-protein" style="width:${pct(p,60)}%"></div></div><span class="nutrition-val">${p}g</span></div>
      <div class="nutrition-item"><span class="nutrition-name">칼슘</span><div class="nutrition-track"><div class="nutrition-fill fill-calcium" style="width:${pct(ca,500)}%"></div></div><span class="nutrition-val">${ca}mg</span></div>
      <div class="nutrition-item"><span class="nutrition-name">철분</span><div class="nutrition-track"><div class="nutrition-fill fill-iron" style="width:${pct(fe,25)}%"></div></div><span class="nutrition-val">${fe}mg</span></div>
    </div></div>`;
}

function mealCard(d,exam=false){
  const cls=exam?'meal-card exam-card':'meal-card';
  return `<div class="${cls}">
    <div class="card-date-bar">
      <span class="card-date-num">${d.date}</span>
      <span class="card-date-day">${d.day}</span>
      ${d.badge?`<span class="card-badge">${d.badge}</span>`:''}
    </div>
    <div class="card-right">
      <div class="card-body">${d.menus.map(row).join('')}</div>
      ${d.nut?nutBar(...d.nut):''}
    </div>
  </div>`;
}

function specialCard(d){
  return `<div class="special-card">
    <div class="card-date-bar">
      <span class="card-date-num">${d.date}</span>
      <span class="card-date-day">${d.day}</span>
      ${d.badge?`<span class="card-badge">${d.badge}</span>`:''}
    </div>
    <div class="special-body">
      <div class="special-icon">${d.icon}</div>
      <div class="special-text">${d.text}</div>
    </div>
  </div>`;
}

/* ── 렌더 ── */
function renderApp(){
  const app=document.getElementById('app');
  let html='';

  WEEKS.forEach((wk,wi)=>{
    let grid='';
    wk.days.forEach(d=>{
      if(d.empty){ grid+=`<div class="empty-card">—</div>`; return; }
      if(d.examOnly){
        grid+=`<div class="empty-card" style="border-color:#fdba74;background:#fff7ed;flex-direction:column;gap:6px;">
          <div style="font-size:22px">📝</div>
          <div style="font-size:12px;color:#f97316;font-weight:700">중간고사 2일</div>
          <div style="font-size:10px;color:#fba55a">${d.date}일 ${d.day}</div>
        </div>`; return;
      }
      if(d.special){ grid+=specialCard(d); return; }
      grid+=mealCard(d,!!d.exam);
    });

    html+=`<section class="week-panel${wi===0?' active':''}" id="week-${wi}">
      <div class="week-title-bar"><h2>${wk.title}</h2><span class="date-range">${wk.range}</span></div>
      <div class="day-headers">
        <div class="day-header">월요일</div><div class="day-header">화요일</div>
        <div class="day-header">수요일</div><div class="day-header">목요일</div>
        <div class="day-header">금요일</div>
      </div>
      <div class="day-grid">${grid}</div>
    </section>`;
  });

  /* 범례 */
  const lgItems=Object.entries(AL).map(([n,name])=>
    `<div class="legend-item"><span class="legend-num">${String(n).padStart(2,'0')}</span><span>${name}</span></div>`
  ).join('');
  html+=`<div class="legend"><div class="legend-title">🔍 알레르기 유발식품</div><div class="legend-grid">${lgItems}</div></div>`;

  app.innerHTML=html;
}

function showWeek(idx){
  document.querySelectorAll('.week-panel').forEach((p,i)=>p.classList.toggle('active',i===idx));
  document.querySelectorAll('.week-tab').forEach((t,i)=>t.classList.toggle('active',i===idx));
}

renderApp();
</script>
